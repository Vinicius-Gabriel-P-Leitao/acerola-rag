name: acerola

services:
  qdrant:
    image: qdrant/qdrant:v1.17.0

    container_name: acerola-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - rag_default
    ports:
      - "6333:6333"
      - "6334:6334"

  rag:
    build:
      context: ..
      dockerfile: docker/dockerfile
    user: "1000:1000"
    ports:
      - "8000:8000"
    container_name: acerola-rag
    command: python -m backend.main
    volumes:
      - ../backend/data:/app/backend/data
    env_file:
      - .env
    depends_on:
      - qdrant
    restart: unless-stopped
    networks:
      - rag_default

volumes:
  qdrant_data:

networks:
  rag_default:
    driver: bridge
