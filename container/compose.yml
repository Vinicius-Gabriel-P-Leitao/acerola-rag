services:
  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: acerola-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: container/Dockerfile
    container_name: acerola-api
    command: python -m backend.main
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data
    env_file:
      - ../.env
    depends_on:
      - qdrant
    restart: unless-stopped


volumes:
  qdrant_data:
